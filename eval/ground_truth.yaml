  # evidence authored AND visually cross-checked (1280px screenshot: dark canvas, white
  # CTAs, the lime panel near the bottom, colorful code/diagram accents confirmed).
  # Findings the eval is EXPECTED to flag (real pipeline behavior, not GT errors):
  #   * #e0e7bb (pale lime) is a QUANTIZER BLEND of white+lime (#e4f222), 0 elements —
  #     the pipeline ranks it cta; the real surface is the lime card #e4f222 (1 clickable
