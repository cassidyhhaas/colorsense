# Human-reviewed expected palette for the real-site quality eval (eval/score.py).
#
# WHAT THIS IS
# ------------
# The eval's independent *anchor*: the colors each page ACTUALLY renders and how it uses them,
# read from the frozen harvest (its declared design-token values + the measured computed color
# of every element), reviewed and locked by a human. This is what makes the eval non-self-
# referential, unlike the golden snapshots in tests/golden/ (which are regenerated from the
# algorithm's own output and can only catch drift, never wrongness).
#
# CRITICAL — page-sourced, NOT brand-sourced. The ground truth is what is ON THE PAGE, full
# stop. A color a brand declares as its "primary" but that the page does not actually paint in
# that role is NOT in the GT (if every CTA on the page is white, white is the correct `cta`
# answer). The algorithm sees only the page; if the GT required brand knowledge the algorithm
# can't see (e.g. a hex looked up on the web), the algorithm could never match it and the EVAL
# would be wrong, not the algorithm. Published brand guidelines may be consulted ONLY to LABEL
# or disambiguate a color that is already on the page — never to add or require one that isn't.
# There is no primary/secondary/accent framing here (the library dropped it for the same
# reason): only usage roles, ranked as the page's own usage warrants.
#
# FORMAT — one canonical color-keyed table per site
# -------------------------------------------------
# Each site is authored ONCE, as the library's canonical color-keyed index shapes it:
#
#   colors:
#     - hex: "#171717"
#       source: "Geist --foreground"
#       roles:                 # every UsageRole this color legitimately paints,
#         text:   [page_text, card_text]   # each -> the ComponentType(s) that produce it
#         link:   [link]
#         border: [border]
#
# From this single table the scorer derives BOTH views the library emits and checks each:
#   * usage  (role -> colors -> components): for each role, the set of colors that belong
#     there, and the component breakdown expected for each.
#   * colors (color -> usages -> role): for each color, the set of roles it appears in.
#
# This is the FULL expected shape, not a subset of roles — so the eval surfaces three things
# the old role-subset GT was blind to:
#   1. RECALL   — an expected color is missing from a role it should appear in.
#   2. NOISE / MIS-BUCKETING — a color lands in a role (or a component votes a color into a
#      role) that the GT does NOT list. Every unexpected output entry is flagged. A role that
#      should be empty is declared empty simply by no color listing it.
#   3. COMPONENTS — a color is attributed to component types the GT doesn't expect for it.
#
# A role with NO color listing it is expected to be EMPTY; any output there is noise.
# We do NOT pin area/prominence/probability/divergence — only which colors are used, and how.
# COMPONENT lists are an unscored DIAGNOSTIC (the scorer cannot judge them independently —
# their only source is the algorithm's output — so they inform, they don't pass/fail).
#
# AUTHORING RULES (operationalized so two authors converge — use `eval/probe.py <site> <hex>`,
# which computes all of this from the frozen harvest):
#   * TOLERANCE is the eval's resolution: perceptual ΔE2000, default 1.0 (see colormetric.py).
#     Author at it, not finer. Two colors a site renders that are < tolerance apart in ANY role
#     are ONE color (a color is a color) — list one entry whose `roles` is their union. The
#     scorer REJECTS the YAML at load if you list both. (Near-black is the exception that proves
#     the rule: #000000 vs #0a0a0a are ΔE2000 1.59 — genuinely distinct, list both; #090909 vs
#     #0a0a0a are 0.16 — one color. The split is decided by ΔE2000 vs tolerance, never by eye.)
#     Prefer distinct GT colors >= 2x tolerance apart: a single output cluster can fall within
#     tolerance of TWO GT colors in the (tol, 2*tol) band and be credited to both (bounded
#     over-credit). The validator only forbids < tol; the 1.59 near-black pair is the one we accept.
#   * REAL vs PHANTOM: a color the algorithm emits is authored only if real ELEMENTS paint it
#     (probe counts them per channel). Zero elements + screenshot area can still be a PHANTOM
#     (a median-cut quantizer blend of two real colors — probe detects this) OR a real area
#     color with no element bg (gradient/image/body — probe flags it "AREA-ONLY, verify vs
#     brand guideline"). List the latter, omit the former. A semi-transparent gradient stop is
#     recorded by its STOP hex (the brand color, what the pipeline keys to), not the composited
#     rendered pixel — design-intent, the one place the GT hex isn't the literal painted pixel.
#   * REAL USE for cta/action/link: the color must be painted by CLICKABLE elements (probe
#     reports the clickable share). A single non-clickable status dot is NOT a CTA.
#   * ROLE + HEX both come from the PAGE: which elements paint the color (and whether they're
#     clickable) decides the role; the rendered cluster color is the hex. A declared token name
#     may help LABEL the role, but actual element usage is the truth — a token declared but not
#     painted on the page earns no role.
#
# `category: quality` sites count toward the aggregate. `harvest_completeness` (consent/login-
# walled, < 100 elements) are reported but NOT aggregated — and the category is CHECKED against
# the harvest's element count at load, so it can't be mis-tagged to dodge a bad score.
#
# STATUS: shadcn + vercel are harvest-evidence-validated worked examples (the format
# template). The other 10 sites are NOT YET authored in this shape — pending.

sites:
  # ===================================================================================
  # shadcn/ui — base theme is Zinc (grays) end-to-end; near-black/white + zinc scale.
  # Harvest-evidence validated (Session 22 + this session). Notable findings the eval
  # is EXPECTED to flag with this GT (real code behavior, not GT errors):
  #   * page role is EMPTY in the output (white files under card_bg, never page_bg) -> X.
  #   * #5f5f5f appears as a `surface` (card_bg) entry but ZERO elements paint it — a
  #     phantom quantizer-blended screenshot bin -> noise.
  # ===================================================================================
  shadcn:
    category: quality
    colors:
      - hex: "#ffffff"
        source: "--background (white): page canvas, cards, header, ghost buttons, badges"
        roles:
          page: [page_bg]
          surface: [card_bg, hero_bg, input_bg]
          banner: [header_bg]
          cta: [cta_bg]        # outline/ghost buttons; the default solid button is near-black
          action: [badge]      # outline badges
      - hex: "#0a0a0a"
        source: "--foreground as rendered (~zinc-950): the dominant body text + links. NOT a
          button bg — 0 elements paint it as background (probe); the solid CTA button is #171717."
        roles:
          text: [page_text, card_text, hero_text]
          link: [link]
      - hex: "#000000"
        source: "pure black: also present as body text / links (distinct from #0a0a0a: ΔE2000 1.59)"
        roles:
          text: [page_text, card_text, hero_text]
          link: [link]
          cta: [cta_bg]
      - hex: "#737373"
        source: "--muted-foreground (zinc-500): muted text + muted links (covers #666666)"
        roles:
          text: [page_text, card_text]
          link: [link]
      - hex: "#e5e5e5"
        source: "--border (zinc-200): the canonical border/divider"
        roles:
          border: [border]
      - hex: "#171717"
        source: "zinc-900: the solid CTA button bg (3 clickable bg elements, probe) + borders of
          small form controls (checkbox, switch). The macOS pipeline blends the small button into
          a #090909 quantizer artifact and so under-emits this as cta — a known pipeline limit the
          eval surfaces; the Linux render emits #171717 cta correctly."
        roles:
          cta: [cta_bg]
          border: [border]

  # ===================================================================================
  # vercel — Geist design system. Signature Vercel blue lives ONLY in link/console text,
  # never as a CTA bg or surface (Session 22). Findings the eval is EXPECTED to flag:
  #   * `text` carries chromatic syntax-highlight colors (#bd2864 pink, #297a3a green,
  #     #7820bc purple, blue) — code-sample decoration, NOT the site's text palette -> noise.
  #   * `border` winner is #000000 (focus outlines / icon strokes) over the real gray
  #     border #ebebeb -> noise + the real border merely present.
  #   * `cta`/`action` carry #067a6e from a single 10x10 status dot misrouted -> noise.
  #   * `link` carries #ffffff from 30 button labels (role=link buttons) — the A2
  #     button-votes-link artifact -> noise.
  # ===================================================================================
  vercel:
    category: quality
    colors:
      - hex: "#fafafa"
        source: "Geist --background: page canvas, cards, hero, nav/footer, ghost buttons"
        roles:
          page: [page_bg]
          surface: [card_bg, hero_bg]
          banner: [nav_bg, footer_bg]
          cta: [cta_bg]        # white ghost buttons; the default solid button is black
          action: [badge]
      - hex: "#171717"
        source: "Geist --foreground: body text, black solid button, dark sections, dark borders"
        roles:
          text: [page_text, card_text, hero_text]
          link: [link]
          cta: [cta_bg]
          surface: [card_bg, hero_bg]   # dark UI sections / hero band (8 elements)
          border: [border]
      - hex: "#4d4d4d"
        source: "Geist gray (accents-5/6): muted text, muted links, dividers"
        roles:
          text: [page_text, card_text]
          link: [link]
          border: [border]
      - hex: "#666666"
        source: "Geist gray: muted text + nav/footer links"
        roles:
          text: [page_text]
          link: [link]
      - hex: "#7d7d7d"
        source: "Geist gray: muted text"
        roles:
          text: [page_text]
      - hex: "#8f8f8f"
        source: "Geist gray: muted links"
        roles:
          link: [link]
      - hex: "#a8a8a8"
        source: "Geist gray: faint muted text"
        roles:
          text: [page_text]
      - hex: "#ebebeb"
        source: "Geist --accents-2 / border: the canonical gray border"
        roles:
          border: [border]
      - hex: "#0072f5"
        source: "--geist-link-color (#0072f5 / #0070f3): the signature Vercel blue, links only"
        roles:
          link: [link]

  # ===================================================================================
  # github — logged-out marketing homepage, DARK theme. Page canvas is near-black
  # (#000000 dominant 0.70 area, #0d1017 secondary), Primer dark-mode UI on top.
  # Harvest-evidence authored (probe + element inspection). Notable findings the eval
  # is EXPECTED to flag (real pipeline behavior, not GT errors):
  #   * WHITE TEXT BURIED: 549 elements paint #ffffff as text + 93 as clickable link,
  #     yet the pipeline surfaces white only in border/surface — text/link recall MISS.
  #   * #0d1017 (the page canvas) leaks into cta/action off ONE incidental clickable <a>
  #     (1296px) over a dark section -> noise; the page canvas is not a CTA.
  #   * #1f6feb (Primer accent blue) paints ONE 1px clickable <a> and 0 screenshot area —
  #     below visibility, not a real on-page CTA; omitted, so its cta entry -> noise.
  #   * white #ffffff also tagged surface/banner off 7 tiny (≈0 area) bg elements -> noise.
  # ===================================================================================
  github:
    category: quality
    colors:
      - hex: "#000000"
        source: "page canvas / dark hero+card+footer sections (13 bg elements, 0.70 area)"
        roles:
          page: [page_bg]
          surface: [card_bg, hero_bg]
          banner: [footer_bg]
      - hex: "#0d1017"
        source: "Primer dark canvas-inset: secondary page/hero/footer bg (6 bg, 0.08 area).
          The lone clickable <a> over it is incidental — NOT a CTA."
        roles:
          page: [page_bg]
          surface: [hero_bg]
          banner: [footer_bg]
      - hex: "#08872b"
        source: "Primer Brand green: the 'Sign up for free' primary CTA (2 clickable <button>, 8872px)"
        roles:
          cta: [cta_bg]
      - hex: "#ffffff"
        source: "white: dominant body/heading text (549 text, 93 clickable link) + white button
          borders (15 border, 7 clickable). Pipeline buries the text/link use — recall surfaces it."
        roles:
          text: [page_text, hero_text, card_text]
          link: [link]
          border: [border]
      - hex: "#f0f6fc"
        source: "Primer --fgColor-default near-white: text + links (79 text, 10 clickable)"
        roles:
          text: [page_text, hero_text, card_text]
          link: [link]
      - hex: "#9198a1"
        source: "Primer --fgColor-muted gray: muted text + links (96 text, 68 clickable)"
        roles:
          text: [page_text]
          link: [link]
      - hex: "#a4aea6"
        source: "muted gray-green: text + links (50 text, 9 clickable)"
        roles:
          text: [page_text]
          link: [link]
      - hex: "#8dd6ff"
        source: "Primer link blue on dark: links only (92 clickable text)"
        roles:
          link: [link]
      - hex: "#59636e"
        source: "Primer muted gray link: its 2 text elements are BOTH clickable -> link, not body text"
        roles:
          link: [link]
      - hex: "#5fed83"
        source: "Primer success green as text accent (5 text elements)"
        roles:
          text: [page_text]
      - hex: "#7c8980"
        source: "muted gray-green text variant (2 text elements)"
        roles:
          text: [page_text]
      - hex: "#24292f"
        source: "Primer near-black, dark text on light chips/badges (2 text elements)"
        roles:
          text: [page_text]
      - hex: "#484f58"
        source: "Primer --borderColor on dark: the canonical divider/border (5 border elements)"
        roles:
          border: [border]
      - hex: "#d1d9e0"
        source: "light Primer border on a light inset (1 clickable border element)"
        roles:
          border: [border]
      - hex: "#191f1b"
        source: "near-black subtle border (1 clickable border element)"
        roles:
          border: [border]
      - hex: "#818b98"
        source: "muted border-gray (1 border element)"
        roles:
          border: [border]
      - hex: "#8c93fb"
        source: "Primer accent-violet border / focus accent (1 border element)"
        roles:
          border: [border]

