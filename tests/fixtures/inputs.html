<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Inputs fixture</title>
  <style>
    body { background: #ffffff; color: #111111; font-family: sans-serif; }
    input, button { padding: 8px 16px; }
    #submit-btn { background: #1f883d; color: #ffffff; }
    #search-box { border: 1px solid #d1d9e0; }
    #pointer-box { cursor: pointer; }
  </style>
</head>
<body>
  <form>
    <input id="search-box" type="TEXT" placeholder="Search">
    <input id="untyped-box" placeholder="Untyped">
    <input id="pointer-box" type="text" placeholder="Styled clickable text input">
    <input id="submit-btn" type="submit" value="Go">
    <button id="real-btn" type="button">A button element</button>
  </form>
</body>
</html>
