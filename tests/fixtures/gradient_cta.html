<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Gradient CTA — gradient-fill harvesting fixture</title>
<style>
  /* Offline stand-in for the disconetwork.com live case: a brand CTA painted with a
     two-stop gradient (purple -> blue) over a transparent computed background-color.
     The harvester captures both opaque stops in `bg_gradient_stops` ONLY for clickable
     pills, so the button's brand colors are not invisible. Negatives pin the gate:
       - .card    is a clickable, gradient-filled rounded RECTANGLE (a stripe.com-style
                  decorative card link) -> not a pill -> no stops (decorative flavor);
       - .divider is a gradient-filled PILL but NOT clickable -> no stops;
       - .solid   has an opaque background-color -> the gradient is ignored;
       - .glow    is a decorative radial gradient that fades to transparent -> not a fill. */
  body { margin: 0; background: #ffffff; font-family: sans-serif; }
  .cta {
    display: inline-block;
    border-radius: 9999px;          /* rounded-full -> pill (all four corners) */
    padding: 10px 24px;
    height: 20px;                   /* short: wider than tall -> stadium */
    color: #ffffff;
    background-image: linear-gradient(135deg, #7c3bed, #3c83f6);
    margin: 16px;
  }
  .card {
    display: inline-block;
    border-radius: 16px;            /* rounded but square-ish -> NOT a pill */
    width: 320px;
    height: 200px;
    background-image: linear-gradient(135deg, #7f7dfc, #f44bcc);
    margin: 16px;
  }
  .divider {
    border-radius: 9999px;          /* pill-shaped but not clickable */
    width: 240px;
    height: 6px;
    background-image: linear-gradient(90deg, #7c3bed, #3c83f6);
    margin: 16px;
  }
  .solid {
    display: inline-block;
    border-radius: 9999px;
    padding: 10px 24px;
    height: 20px;
    color: #ffffff;
    background-color: #101828;      /* opaque solid wins; gradient must be ignored */
    background-image: linear-gradient(135deg, #7c3bed, #3c83f6);
    margin: 16px;
  }
  .glow {
    display: inline-block;
    border-radius: 9999px;
    width: 240px;
    height: 60px;
    background-image: radial-gradient(circle at 50% 0%, #7c3bed, rgba(0, 0, 0, 0));
    margin: 16px;
  }
</style>
</head>
<body>
  <a class="cta" href="#start">Get started</a>
  <a class="card" href="#feature"></a>
  <div class="divider"></div>
  <a class="solid" href="#docs">Read docs</a>
  <a class="glow" href="#more"></a>
</body>
</html>
