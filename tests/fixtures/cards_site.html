<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Marketplace — card-grid fixture</title>
<style>
  /* A card-heavy catalog: six structurally-identical `.product-card` siblings with
     a border, which the repetition detector should label `card_bg`. Also carries a
     vendor-prefixed chat widget (`intercom-*`) that must be tagged third_party and
     kept out of the palette. No dark-mode block -> single theme. */
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { background: #ffffff; color: #1a1a1a; font-family: sans-serif; }
  .site-header {
    background: #0d9488;
    color: #ffffff;
    width: 1280px;
    height: 64px;
  }
  .product-card {
    background: #f1f5f9;
    color: #1a1a1a;
    border: 1px solid #cbd5e1;
    width: 380px;
    height: 240px;
    display: inline-block;
  }
  .cta {
    background: #ea580c;
    color: #ffffff;
    border: none;
    width: 200px;
    height: 52px;
    cursor: pointer;
  }
  .cta:hover { background: #c2410c; }
  .intercom-launcher {
    background: #1f8ded;
    color: #ffffff;
    width: 56px;
    height: 56px;
    border-radius: 50%;
  }
</style>
</head>
<body>
  <header class="site-header"><h1>Marketplace</h1></header>
  <main>
    <div class="product-card">Item 1</div>
    <div class="product-card">Item 2</div>
    <div class="product-card">Item 3</div>
    <div class="product-card">Item 4</div>
    <div class="product-card">Item 5</div>
    <div class="product-card">Item 6</div>
    <button class="cta">Checkout</button>
  </main>
  <div class="intercom-launcher">?</div>
</body>
</html>
