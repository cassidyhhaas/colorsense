<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Hover fixture</title>
<style>
  body { margin: 0; padding: 40px; background: #ffffff; }
  #cta {
    background: #2244aa;
    color: #ffffff;
    border: none;
    width: 200px;
    height: 60px;
    cursor: pointer;
    font-size: 16px;
  }
  #cta:hover {
    background: #ff6600;
  }
  #plain {
    background: #cccccc;
    color: #000000;
    width: 200px;
    height: 60px;
    cursor: pointer;
  }
</style>
</head>
<body>
  <button id="cta">Hover me</button>
  <button id="plain">No change</button>
</body>
</html>
