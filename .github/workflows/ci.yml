name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    name: lint · types · tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Mypy (strict)
        run: uv run mypy src

      # Browserless gates run first for fast failure on lint/type/logic errors
      # before paying for the Chromium download.
      - name: Pytest (browserless)
        run: uv run pytest -m "not browser"

      # Install Chromium (and its OS dependencies) so the real render/harvest and
      # end-to-end pipeline tests can run. `--with-deps` pulls the apt packages
      # Playwright needs on the Ubuntu runner.
      - name: Install Chromium for Playwright
        run: uv run playwright install --with-deps chromium

      - name: Pytest (browser / end-to-end)
        run: uv run pytest -m browser
