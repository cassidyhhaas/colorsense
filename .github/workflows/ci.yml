name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    name: lint · types · tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Mypy (strict)
        run: uv run mypy src

      # Browser tests (real Chromium renders) are excluded: this job installs no
      # browser binary. They run locally via `uv run playwright install chromium`
      # followed by `uv run pytest`. See the `browser` marker in pyproject.toml.
      - name: Pytest (browserless)
        run: uv run pytest -m "not browser"
