name: CI

on:
  push:
    branches: [main]
  pull_request:

# Independent jobs run in parallel; each surfaces as its own status check so
# branch protection can require build, lint, and test (or the aggregate `ci`
# job below) before a PR is mergeable.
jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Build sdist + wheel
        run: uv build

      - name: Verify the wheel bundles the config data file and py.typed
        run: |
          unzip -l dist/*.whl
          unzip -l dist/*.whl | grep -q "colorsense/data/palette_config.yaml"
          unzip -l dist/*.whl | grep -q "colorsense/py.typed"

      - name: Upload built artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  lint:
    name: lint (ruff · mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.12"
          enable-cache: true

      # The examples group supplies the FastAPI/uvicorn types mypy needs to check examples/.
      - name: Sync dependencies
        run: uv sync --group examples

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

      # Targets come from [tool.mypy] files (src + examples).
      - name: Mypy (strict)
        run: uv run mypy

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.12"
          enable-cache: true

      # The examples group lets the example-webservice tests run instead of skipping
      # (they stub the render — no browser needed).
      - name: Sync dependencies
        run: uv sync --group examples

      # Browserless gates run first for fast failure on logic errors before
      # paying for the Chromium download. Coverage is collected here and
      # appended to by the browser run so the floor reflects the whole suite
      # (browserless alone leaves the harvest/render layers largely uncovered).
      - name: Pytest (browserless, collect coverage)
        run: uv run pytest -m "not browser" --cov=colorsense --cov-report=

      # Install Chromium (and its OS dependencies) so the real render/harvest and
      # end-to-end pipeline tests can run. `--with-deps` pulls the apt packages
      # Playwright needs on the Ubuntu runner.
      - name: Install Chromium for Playwright
        run: uv run playwright install --with-deps chromium

      - name: Pytest (browser / end-to-end, append coverage)
        run: uv run pytest -m browser --cov=colorsense --cov-append --cov-report=

      - name: Coverage report + floor
        run: uv run coverage report --show-missing --fail-under=90

  # Aggregate gate: a single check that passes only when every upstream job
  # succeeds. Set this as the lone required status check in branch protection so
  # the list never needs updating when jobs are renamed or added (just keep
  # `needs` current). alls-green encodes the correct result-state logic
  # (success/skipped/failure/cancelled) that a hand-rolled shell check gets wrong.
  ci:
    name: ci
    if: always()
    needs: [build, lint, test]
    runs-on: ubuntu-latest
    steps:
      - name: Require all upstream jobs to have succeeded
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # release/v1
        with:
          jobs: ${{ toJSON(needs) }}
