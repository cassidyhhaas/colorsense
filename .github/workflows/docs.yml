name: Docs

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "src/colorsense/**"
      - "README.md"
      - "SECURITY.md"
      - "CHANGELOG.md"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/docs.yml"

permissions:
  contents: read

# Per-ref grouping so PR check builds never queue behind (or get superseded by)
# unrelated runs; on main this still serializes deploys, and an in-flight
# production deploy is never cancelled, so main converges to the latest build.
concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Strict build on every PR that touches the site's inputs, so documentation
  # breakage (broken links, mkdocstrings failures) blocks the PR. Also runs on
  # main as the deploy's build step.
  build:
    name: build (mkdocs --strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --group docs

      - name: Build site (strict)
        run: uv run mkdocs build --strict

      - name: Upload site artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site/

  # Deploy to GitHub Pages on pushes to main (Pages build type: GitHub Actions).
  deploy:
    name: deploy (GitHub Pages)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # SHA-pinned: this job holds pages: write + id-token: write, the same discipline
      # applied to the publish workflow's trust-critical actions.
      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
