name: Docs

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "src/colorsense/**"
      - "README.md"
      - "SECURITY.md"
      - "CHANGELOG.md"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/docs.yml"

permissions:
  contents: read

# Only one Pages deployment at a time; let an in-flight production deploy
# finish (don't cancel) so main always converges to the latest build.
concurrency:
  group: docs-deploy
  cancel-in-progress: false

jobs:
  # Strict build on every PR that touches the site's inputs, so documentation
  # breakage (broken links, mkdocstrings failures) blocks the PR. Also runs on
  # main as the deploy's build step.
  build:
    name: build (mkdocs --strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --group docs

      - name: Build site (strict)
        run: uv run mkdocs build --strict

      - name: Upload site artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v4
        with:
          path: site/

  # Deploy to GitHub Pages on pushes to main (Pages build type: GitHub Actions).
  deploy:
    name: deploy (GitHub Pages)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
