# Keep the GitHub Actions used by our workflows current. Dependabot opens PRs
# that bump each `uses:` ref — including SHA-pinned actions, updating both the
# pinned commit SHA and its trailing `# <version>` comment.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns:
          - "*"

  # Keep the Python dev tooling (ruff, mypy, pytest, …) current. Scoped to the
  # development dependency group ([dependency-groups] dev in pyproject.toml);
  # pyproject.toml and uv.lock are updated together. Runtime deps are left to
  # Dependabot security alerts rather than routine version bumps.
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
    allow:
      - dependency-type: "development"
    groups:
      python-dev:
        patterns:
          - "*"
