# Keep the GitHub Actions used by our workflows current. Dependabot opens PRs
# that bump each `uses:` ref — including SHA-pinned actions, updating both the
# pinned commit SHA and its trailing `# <version>` comment.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns:
          - "*"

  # Keep uv.lock current across all dependencies (runtime + dev tooling) so CI
  # exercises recent versions and surfaces breakage early. `lockfile-only` means
  # only uv.lock is updated — the permissive `>=` floors in [project.dependencies]
  # that ship to consumers are never touched (raising those is a deliberate act,
  # left to security alerts for runtime CVEs). Dev tools are bare names whose
  # versions live only in the lock, so this keeps them current too.
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    versioning-strategy: lockfile-only
    commit-message:
      prefix: "deps"
    groups:
      python:
        patterns:
          - "*"
