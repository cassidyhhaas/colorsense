# =============================================================================
# palette_config.yaml
# Configuration for website color-palette analysis.
#
# Two config domains:
#   1. token_vocabulary  — maps CSS custom-property NAMES -> semantic token roles,
#                          then semantic roles -> usage intent (distributions over usage roles).
#   2. component_classifier — rule-based scorer weights for classifying DOM
#                          elements by visual COMPONENT (source).
#
# All numeric weights are unnormalized votes summed per target, then softmaxed.
# These are calibrated starting points, not ground truth — tune against labels.
# =============================================================================

token_vocabulary:

  # --- Namespace prefixes stripped from a token name before matching. --------
  # Longest match wins. Presence of a known system prefix also confirms a design
  # system is in use and applies `known_system_confidence_boost` to the match.
  namespace_prefixes:
    - "md-sys-color-"      # Material 3
    - "md-ref-palette-"    # Material 3 reference
    - "wp--preset--color--"# WordPress
    - "chakra-colors-"     # Chakra
    - "ion-color-"         # Ionic
    - "sl-color-"          # Shoelace
    - "bs-"                # Bootstrap
    - "ant-"               # Ant Design
    - "mui-"               # MUI
    - "mantine-"           # Mantine
    - "chakra-"
    - "ion-"
    - "sl-"
    - "ui-"
    - "color-"             # Tailwind v4 (--color-*) and generic namespacing
    - "colour-"
    - "c-"
  # Trailing noise suffixes also stripped (e.g. --theme-color -> theme).
  strip_trailing: ["-color", "-colour"]
  known_system_confidence_boost: 1.25   # multiplier on weight when a system prefix matched

  # --- Name rules: token-name substring -> semantic token role + weight. -----
  # match_type: substring (default) | exact | regex. Matching is case-insensitive
  # on the post-strip remainder. First-listed higher-specificity rules should win
  # ties; the loader checks `exact` then `regex` then `substring` longest-match.
  name_rules:
    # brand / role names ------------------------------------------------------
    - {match: "primary",    role: brand_primary,   weight: 5.0}
    - {match: "brand",      role: brand_primary,   weight: 5.0}
    - {match: "theme",      role: brand_primary,   weight: 3.0}
    - {match: "main",       role: brand_primary,   weight: 2.5}
    - {match: "secondary",  role: brand_secondary, weight: 4.0}
    - {match: "tertiary",   role: brand_secondary, weight: 2.5}
    - {match: "accent",     role: brand_accent,    weight: 5.0}
    - {match: "highlight",  role: brand_accent,    weight: 3.5}
    - {match: "ring",       role: brand_accent,    weight: 3.0}  # focus ring ~ accent
    # interactive -------------------------------------------------------------
    - {match: "cta",        role: interactive,     weight: 5.0}
    - {match: "link",       role: interactive,     weight: 4.5}
    - {match: "action",     role: interactive,     weight: 4.0}
    - {match: "button",     role: interactive,     weight: 3.5}
    - {match: "btn",        role: interactive,     weight: 3.5}
    # surfaces ----------------------------------------------------------------
    - {match: "background", role: surface_base,    weight: 4.0}
    - {match: "bg",         role: surface_base,    weight: 3.5}
    - {match: "page",       role: surface_base,    weight: 3.5}
    - {match: "body",       role: surface_base,    weight: 3.5}
    - {match: "canvas",     role: surface_base,    weight: 3.0}
    - {match: "base",       role: surface_base,    weight: 2.5}
    - {match: "surface",    role: surface_raised,  weight: 3.5}
    - {match: "card",       role: surface_raised,  weight: 4.5}
    - {match: "panel",      role: surface_raised,  weight: 3.5}
    - {match: "popover",    role: surface_raised,  weight: 3.5}
    - {match: "modal",      role: surface_raised,  weight: 3.5}
    - {match: "dialog",     role: surface_raised,  weight: 3.5}
    - {match: "sheet",      role: surface_raised,  weight: 3.0}
    - {match: "tooltip",    role: surface_raised,  weight: 3.0}
    - {match: "menu",       role: surface_raised,  weight: 2.5}
    - {match: "dropdown",   role: surface_raised,  weight: 2.5}
    - {match: "header",     role: surface_raised,  weight: 3.5}  # header bg
    - {match: "masthead",   role: surface_raised,  weight: 3.5}
    - {match: "topbar",     role: surface_raised,  weight: 3.0}
    - {match: "footer",     role: surface_raised,  weight: 3.0}
    - {match: "nav",        role: surface_raised,  weight: 3.0}
    - {match: "sidebar",    role: surface_raised,  weight: 3.0}
    - {match: "hero",       role: surface_raised,  weight: 3.5}  # often brand-colored
    - {match: "banner",     role: surface_raised,  weight: 3.0}
    - {match: "jumbotron",  role: surface_raised,  weight: 3.0}
    # text / foreground -------------------------------------------------------
    - {match: "foreground", role: text_body,       weight: 4.5}
    - {match: "text",       role: text_body,       weight: 4.5}
    - {match: "fg",         role: text_body,       weight: 4.0}
    - {match: "ink",        role: text_body,       weight: 3.5}
    - {match: "copy",       role: text_body,       weight: 3.0}
    - {match: "content",    role: text_body,       weight: 2.5}
    - {match: "heading",    role: text_body,       weight: 3.0}
    - {match: "title",      role: text_body,       weight: 2.5}
    # neutrals ----------------------------------------------------------------
    - {match: "gray",       role: neutral,         weight: 4.5}
    - {match: "grey",       role: neutral,         weight: 4.5}
    - {match: "neutral",    role: neutral,         weight: 4.5}
    - {match: "slate",      role: neutral,         weight: 4.0}
    - {match: "zinc",       role: neutral,         weight: 4.0}
    - {match: "stone",      role: neutral,         weight: 4.0}
    - {match: "silver",     role: neutral,         weight: 3.0}
    - {match: "muted",      role: neutral,         weight: 3.5}
    - {match: "subtle",     role: neutral,         weight: 3.5}
    - {match: "dim",        role: neutral,         weight: 2.5}
    - {match: "faint",      role: neutral,         weight: 2.5}
    - {match: "placeholder",role: neutral,         weight: 3.0}
    - {match: "disabled",   role: neutral,         weight: 3.0}
    - {match: "hint",       role: neutral,         weight: 2.5}
    - {match: "light",      role: neutral,         weight: 2.5}  # lightness decides L/D
    - {match: "dark",       role: neutral,         weight: 2.5}
    - {match: "white",      role: neutral,         weight: 2.5}
    - {match: "black",      role: neutral,         weight: 2.5}
    # borders -----------------------------------------------------------------
    - {match: "border",     role: border,          weight: 4.0}
    - {match: "divider",    role: border,          weight: 4.0}
    - {match: "outline",    role: border,          weight: 3.5}
    - {match: "separator",  role: border,          weight: 3.5}
    - {match: "stroke",     role: border,          weight: 3.0}
    - {match: "input",      role: border,          weight: 2.5}
    - {match: "field",      role: border,          weight: 2.0}
    # status (segregated — see status handling below) ------------------------
    - {match: "success",    role: status,          weight: 5.0}
    - {match: "positive",   role: status,          weight: 4.0}
    - {match: "error",      role: status,          weight: 5.0}
    - {match: "danger",     role: status,          weight: 5.0}
    - {match: "destructive",role: status,          weight: 5.0}
    - {match: "negative",   role: status,          weight: 4.0}
    - {match: "warning",    role: status,          weight: 5.0}
    - {match: "caution",    role: status,          weight: 4.0}
    - {match: "info",       role: status,          weight: 4.0}
    - {match: "alert",      role: status,          weight: 3.0}
    - {match: "invalid",    role: status,          weight: 3.5}
    # ignore (no palette signal) ---------------------------------------------
    - {match: "shadow",     role: ignore,          weight: 5.0}
    - {match: "overlay",    role: ignore,          weight: 3.0}
    - {match: "scrim",      role: ignore,          weight: 3.0}
    - {match: "backdrop",   role: ignore,          weight: 3.0}

  # --- Relational modifiers: reroute a token to "text-on-<base>". ------------
  # e.g. --primary-foreground / --md-sys-color-on-primary / --card-foreground.
  # The token's value is a TEXT color paired with the referenced surface, so it
  # is classified ``text_on`` rather than as a surface/brand color itself.
  relational_modifiers:
    - {pattern: "^on-(?P<base>.+)$",     type: text_on, weight: 4.5}  # Material
    - {pattern: "^(?P<base>.+)-fore$",   type: text_on, weight: 3.0}
    - {pattern: "^(?P<base>.+)-foreground$", type: text_on, weight: 4.5}  # shadcn
    - {pattern: "^(?P<base>.+)-fg$",     type: text_on, weight: 4.0}
    - {pattern: "^(?P<base>.+)-text$",   type: text_on, weight: 3.5}

  # --- Numbered scale detection. ---------------------------------------------
  # Lightness L/D is decided by the MEASURED resolved color, not the number.
  # The number is used only to (a) confirm an intentional scale exists
  # (confidence boost) and (b) pick the brand "anchor" step among chromatic
  # members. Neutral-named families are neutral candidates regardless of number.
  scale_detection:
    enabled: true
    number_pattern: "(?:^|[-_/.])(\\d{1,3})$"   # captures -500, /9, .50, _100
    chromatic_families: [red, orange, amber, yellow, lime, green, emerald, teal,
                         cyan, sky, blue, indigo, violet, purple, fuchsia, pink,
                         rose, brand, primary, accent]
    neutral_families:   [gray, grey, neutral, slate, zinc, stone, gunmetal, mauve, sand, sage]
    # Anchor ranges by scale convention; a number is an anchor if it falls
    # within any convention's range.
    anchor_ranges:
      tailwind: [500, 700]   # 50..950
      radix:    [9, 10]      # 1..12
    # Base weight for any numbered-scale classification, before the anchor boost below.
    # Sits inside the name-rule weight range (2.0-5.0): a scale hit is stronger evidence
    # than a generic substring match, weaker than an exact semantic name.
    base_weight: 3.0
    scale_present_confidence_boost: 1.3

  # --- Semantic token role -> usage intent (distribution over usage roles). ----
  # *** This is the most consequential table. *** Each row is the usage intent: a
  # belief about HOW a token's color is used when rendered (inferred from the
  # token's name, before the page is measured), over the 8 developer-facing usage roles:
  #   page    (base canvas)         surface (cards/modals/hero/inputs)
  #   banner  (header/nav/footer)   cta     (primary action background)
  #   action  (secondary buttons/badges)    text (typography)
  #   link    (link color)          border  (borders/dividers)
  # Distributions need not sum to 1 exactly; loader normalizes. `_on` / status /
  # ignore channels are not usage roles — they are reported on the classified
  # token, not used in usage ranking.
  #
  # These distributions were derived from the previous 4-category table (surface / text /
  # interactive / border) by SPLITTING each old category's mass across the roles it
  # became, preserving author intent — old `surface` -> page/surface/banner, old
  # `interactive` -> cta/link/action, old `text` -> text, old `border` -> border —
  # and weighting the split toward the most-likely role for each semantic (e.g. a
  # brand_primary's interactive mass leans cta>link>action; a brand_secondary's leans
  # action; surface_base leans page while surface_raised leans surface/banner).
  semantic_role_to_usage_intent_or_channel:
    brand_primary:   {cta: 0.30, link: 0.15, action: 0.05, surface: 0.20, banner: 0.15, page: 0.05, text: 0.10}
    brand_secondary: {surface: 0.25, banner: 0.20, page: 0.05, action: 0.15, cta: 0.10, link: 0.05, border: 0.20}
    brand_accent:    {cta: 0.45, link: 0.30, action: 0.15, surface: 0.07, banner: 0.03}
    interactive:     {cta: 0.45, link: 0.35, action: 0.20}
    surface_base:    {page: 0.70, surface: 0.20, banner: 0.10}
    surface_raised:  {surface: 0.60, banner: 0.30, page: 0.10}
    text_body:       {text: 1.0}
    neutral:         {page: 0.20, surface: 0.13, banner: 0.07, text: 0.35, border: 0.25}
    border:          {border: 1.0}
    text_on:         {channel: text_on}     # reported on token, not usage-ranked
    status:          {channel: status}      # excluded from palette, reported separately
    ignore:          {channel: ignore}      # dropped

  status_excluded_from_palette: true


# =============================================================================
component_classifier:

  # The set of component labels is the ComponentType enum in models.py. Color-channel
  # routing is a fixed code-level convention (see palette/inventory.py): components named
  # <component>_text and `link` are fed by the element's text color, `border` by its border
  # color, and everything else by its background color.

  softmax_temperature: 0.5
  min_component_prob: 0.05

  # --- Feature family 1: semantic tag / ARIA role (highest precision). -------
  semantic_tags:
    - {match: "header",            votes: {header_bg: 4.5}}
    - {match: "role=banner",       votes: {header_bg: 4.0, hero_bg: 1.5}}
    - {match: "nav",               votes: {nav_bg: 4.5}}
    - {match: "role=navigation",   votes: {nav_bg: 4.0}}
    - {match: "footer",            votes: {footer_bg: 4.5}}
    - {match: "role=contentinfo",  votes: {footer_bg: 4.0}}
    - {match: "main",              votes: {page_bg: 3.0, page_text: 3.0}}
    - {match: "role=main",         votes: {page_bg: 3.0, page_text: 3.0}}
    - {match: "article",           votes: {page_bg: 2.5, page_text: 2.5}}
    - {match: "body",              votes: {page_bg: 5.0, page_text: 4.0}}
    # `a` (anchor) routing lives in the interactivity family below, fill-gated: a
    # button-styled anchor's label is a CTA label (cta_text, no usage role), only a
    # bare anchor is a `link`. See the `a & button_surface` / `a & !button_surface` rules.
    - {match: "button",            votes: {cta_bg: 3.5}}
    - {match: "role=button",       votes: {cta_bg: 3.0}}
    # input[submit] matches only inputs whose type attribute is button-like
    # (submit/button/image/reset); plain text/search inputs get no cta_bg vote.
    - {match: "input[submit]",     votes: {cta_bg: 3.5}}
    - {match: "dialog",            votes: {modal_bg: 4.0}}
    - {match: "role=dialog",       votes: {modal_bg: 3.5}}
    - {match: "aside",             votes: {nav_bg: 2.5}}
    # The input border vote moved to the border_presence family below: it now applies
    # only when the input actually paints a border (instead of diluting borderless
    # inputs' softmax with a vote the inventory would drop anyway).
    - {match: "input",             votes: {input_bg: 3.0}}

  # --- Feature family 2: geometry / position. --------------------------------
  geometry:
    thresholds:
      top_band: 0.15        # fraction of viewport height
      bottom_band: 0.85
      full_width: 0.90      # fraction of viewport width
      short_h: 0.25
      hero_min_h: 0.35
      sticky_top_px: 80
      small_area: 0.02      # fraction of viewport area
      badge_max_h_px: 36    # a badge holds a single line of text; 36px sits in the
                            # empirical gap between real chips (<=32px) and two-line
                            # stat containers / toggles (>=40px)
    rules:
      - {when: "full_width & top<top_band & h<short_h", votes: {header_bg: 2.5, nav_bg: 1.5}}
      - {when: "position in (fixed,sticky) & top<sticky_top_px", votes: {nav_bg: 3.0}}
      - {when: "full_width & top<top_band & h>=hero_min_h", votes: {hero_bg: 3.0, hero_text: 1.5}}
      - {when: "top>=bottom_band & full_width", votes: {footer_bg: 2.5}}
      - {when: "area<=small_area & clickable", votes: {link: 1.5, badge: 1.0}}
      # Badge/chip: a fully-rounded element (all four corners, via the min-corner test),
      # wider than tall (excludes circles), that paints a fill (bg/border/ring), carries
      # its own direct text, and is a single text-line tall (<= badge_max_h_px). These are
      # status pills / category chips carrying an accent tint. The vote (3.0) stays below
      # the semantic `a`/`button` votes so pill-shaped CTAs remain interactive. Pills are
      # also excluded from the card detector below.
      - {when: "pill & paints_fill & has_text & h<=badge_max_h_px", votes: {badge: 3.0}}

  # --- Feature family 3: class / id token match (fuzzy substring). -----------
  class_tokens:
    - {match: "card",          votes: {card_bg: 3.0}}
    - {match: "tile",          votes: {card_bg: 2.5}}
    - {match: "product-card",  votes: {card_bg: 3.5}}
    - {match: "hero",          votes: {hero_bg: 3.0}}
    - {match: "masthead",      votes: {hero_bg: 2.5, header_bg: 1.5}}
    - {match: "jumbotron",     votes: {hero_bg: 3.0}}
    - {match: "splash",        votes: {hero_bg: 2.5}}
    - {match: "cover",         votes: {hero_bg: 2.0}}
    - {match: "site-header",   votes: {header_bg: 3.5}}
    - {match: "page-header",   votes: {header_bg: 3.0}}
    - {match: "topbar",        votes: {header_bg: 2.5, nav_bg: 1.5}}
    - {match: "header",        votes: {header_bg: 2.5}}
    - {match: "navbar",        votes: {nav_bg: 3.0}}
    - {match: "navigation",    votes: {nav_bg: 2.8}}
    - {match: "nav",           votes: {nav_bg: 2.5}}
    - {match: "menu",          votes: {nav_bg: 1.5}}
    - {match: "footer",        votes: {footer_bg: 3.0}}
    - {match: "colophon",      votes: {footer_bg: 2.5}}
    - {match: "cta",           votes: {cta_bg: 3.5}}
    - {match: "call-to-action",votes: {cta_bg: 3.5}}
    - {match: "btn-primary",   votes: {cta_bg: 4.0}}
    - {match: "primary-button",votes: {cta_bg: 4.0}}
    - {match: "get-started",   votes: {cta_bg: 3.0}}
    - {match: "signup",        votes: {cta_bg: 2.5}}
    - {match: "subscribe",     votes: {cta_bg: 2.5}}
    - {match: "btn",           votes: {cta_bg: 2.5}}
    - {match: "button",        votes: {cta_bg: 2.5}}
    - {match: "btn-secondary", votes: {button_secondary: 3.5}}
    - {match: "btn-outline",   votes: {button_secondary: 3.0}}
    - {match: "ghost",         votes: {button_secondary: 2.5}}
    - {match: "link",          votes: {link: 2.5}}
    - {match: "read-more",     votes: {link: 2.0}}
    - {match: "modal",         votes: {modal_bg: 3.0}}
    - {match: "dialog",        votes: {modal_bg: 3.0}}
    - {match: "popover",       votes: {modal_bg: 2.5}}
    - {match: "lightbox",      votes: {modal_bg: 2.5}}
    - {match: "drawer",        votes: {modal_bg: 2.0, nav_bg: 1.0}}
    - {match: "badge",         votes: {badge: 3.0}}
    - {match: "chip",          votes: {badge: 2.5}}
    - {match: "pill",          votes: {badge: 2.5}}
    - {match: "tag",           votes: {badge: 2.0}}
    - {match: "sidebar",       votes: {nav_bg: 2.5}}
    - {match: "panel",         votes: {card_bg: 2.0}}
    - {match: "well",          votes: {card_bg: 1.5}}
    - {match: "input",         votes: {input_bg: 2.5}}
    - {match: "form-control",  votes: {input_bg: 2.5}}
    # Layout noise — explicitly near-zero so wrappers don't pollute palette.
    - {match: "container",     votes: {page_bg: 0.5}}
    - {match: "wrapper",       votes: {page_bg: 0.5}}
    - {match: "row",           votes: {page_bg: 0.3}}
    - {match: "col",           votes: {page_bg: 0.3}}
    - {match: "grid",          votes: {page_bg: 0.3}}
    - {match: "layout",        votes: {page_bg: 0.4}}
    - {match: "inner",         votes: {page_bg: 0.3}}

  # --- Feature family 4: interactivity. --------------------------------------
  interactivity:
    - {when: "clickable",               votes: {cta_bg: 1.5, link: 1.0}}
    - {when: "input[submit|button]",    votes: {cta_bg: 2.0}}
    - {when: "has_hover_color_change",  votes: {cta_bg: 1.5}}   # strong accent signal
    # Anchor routing (replaces the old semantic `a` -> link rule). A button-styled anchor
    # — one that paints a solid bg or a border — is a CTA whose label text is `cta_text`
    # (a CTA label, carried by no usage role), NOT a `link`. A bare anchor (no such surface,
    # box-shadow alone does not count) is a genuine inline text link. The 4.5 preserves the
    # former semantic `a` weight so unfilled inline links are unchanged.
    - {when: "a & !button_surface",     votes: {link: 4.5}}
    - {when: "a & button_surface",      votes: {cta_text: 4.5}}
    # Non-anchor companion to the anchor rules. The rules above feed EVERY clickable a
    # text-channel `link` vote (the generic `clickable` rule's `link:1.0`, the small-clickable
    # geometry rule's `link:1.5`); for a button LABEL that is a span/div/svg/path descendant of
    # a CTA, that white-on-dark text wrongly lands in `link`. `classify.components` relabels it
    # to `cta_text` (channel-preserving) when its composited `effective_bg` is a distinct
    # interactive fill the text is legible on but illegible on the page canvas — the
    # contrast-relative signature of a CTA label vs a genuine inline link (legible on the page's
    # own reading surface). Thresholds live in `contrast_relabel` below; there is no additive
    # vote rule here because the effect is the in-code relabel, gated on harvested signals
    # (`effective_bg`, `effective_bg_from_clickable`) a YAML predicate cannot express.

  # --- Feature family 4b: border presence. ------------------------------------
  # Applied to any element whose harvested `border` is non-None — the harvester
  # width-gates it, so non-None means the element genuinely paints a border. The 2.5
  # is calibrated against the softmax so structural borders (cards, inputs) survive
  # pruning while button-like inputs/CTAs stay interactive, not borders (full
  # derivation: docs/how-it-works.md).
  border_presence:
    votes: {border: 2.5}

  # --- Feature family 4c: text presence. --------------------------------------
  # Applied to any NON-clickable element with `has_text` (>=1 direct child text node
  # with non-whitespace content; descendant text doesn't count). Clickable elements
  # are deliberately excluded: their typography is interactive by definition and
  # already routed via the anchor / clickable link rules. The 2.0 stays below every semantic *_text
  # vote so semantic rules dominate where they apply (derivation: docs/how-it-works.md).
  text_presence:
    votes: {page_text: 2.0}

  # --- Feature family 5: repetition (the card detector). ---------------------
  # Pill/chip-shaped elements are excluded from this detector (a pill is never a card),
  # so repeated status pills / category chips don't satisfy the card heuristic and flood
  # `card_bg` with their accent colors — they're routed to `badge` by the geometry rule.
  repetition:
    min_siblings: 3
    requires_any: [box_shadow, border, distinct_bg_from_parent]
    votes: {card_bg: 3.5, card_text: 2.0}

  # --- Circle-badge group (small recurring clickable circular chips). --------
  # A perfect circle (`rounded-full`, width == height) is NOT a pill (the pill test demands
  # width > height), so the badge geometry rule never matches it and a small circular chip
  # with no text node falls through to the card detector, leaking its accent into `surface`.
  # This promotes a small circle to `badge` (-> action) ONLY when it is clickable, paints a
  # fill, and RECURS as a group of >= min_siblings structurally-similar siblings — the
  # signature of a repeated UI chip (supabase's 54 black corner badges). A lone decorative
  # dot (non-clickable) and a one-off clickable status dot (whose color already wins `link`
  # from its text channel) are both spared: the first by the clickable gate, the second by
  # the recurrence gate. No has_text gate — these chips carry an icon, not a text node. The
  # 3.0 vote matches the geometry badge rule. Small circles are also excluded from the card
  # detector below (a small circle is never a card), so the decorative dot leaks nowhere.
  circle_badge:
    max_h_px: 36
    min_siblings: 3
    votes: {badge: 3.0}

  # --- Page-canvas fallback (transparent-canonical-canvas sites). ------------
  # Fires ONLY when the canonical canvas (`html`/`body`/`main`) paints no opaque
  # background — the modern utility-CSS pattern (e.g. shadcn) where the white page
  # surface lives on a full-viewport `<div class="...bg-background...">` instead. On those
  # sites the canvas div's only `page_bg` signal is a few weak layout class-token votes,
  # which the geometry `hero_bg` (3.0) and repetition `card_bg` (3.5) votes bury in the
  # bg-channel softmax, so the page color never reaches the `page` role. The classifier
  # picks the largest viewport-spanning opaque-bg element near the top of the page (the
  # full_width / top_band geometry thresholds) WHOSE COLOR matches the derived page-canvas
  # color within `color_match_delta_e` (CIEDE2000) as the canvas, injects `page_bg`, and
  # clears the competing hero/card votes from that one element. Opaque-body sites never
  # trigger this. `page_bg_vote` matches the `body -> page_bg` semantic vote (5.0) so the
  # canvas wins its bg channel exactly as a real opaque <body> would. `color_match_delta_e`
  # is the safety gate: without it the largest full-width top-band opaque element can be a
  # brand-colored hero/banner, and the fallback would mislabel that hero as `page`; 2.0 is
  # tight enough to reject a distinct hero while tolerating sub-pixel color rounding.
  page_canvas_fallback:
    page_bg_vote: 5.0
    color_match_delta_e: 2.0
    suppress: [hero_bg, hero_text, card_bg, card_text]

  # --- Feature family 6: origin / third-party. -------------------------------
  third_party:
    votes_iframe: {third_party: 5.0}
    votes_cross_origin: {third_party: 4.0}
    votes_shadow_host: {third_party: 2.5}
    votes_vendor_match: {third_party: 5.0}
    vendor_prefixes:
      [intercom, drift, zendesk, hubspot, hs-, crisp, tawk, livechat, freshchat,
       freshworks, usercentrics, onetrust, cookiebot, osano, cookieyes, klaro,
       hotjar, _hj, fb-, fbcdn, twitter-widget, addthis, sharethis, disqus,
       recaptcha, grecaptcha, g-recaptcha, stripe, paypal, trustpilot, yotpo,
       mailchimp, klaviyo, optinmonster, typeform, calendly, gtm, doubleclick,
       adsbygoogle, advert, ad-]

  # --- Vetoes / suppressors (multiplicative, applied after summing). ---------
  suppressors:
    third_party_present:        {factor: 0.05, applies_to: brand_components}
    aria_hidden:                {factor: 0.0,  applies_to: all}
    zero_area_or_hidden:        {factor: 0.0,  applies_to: all}
  # `border` is included since the border_presence family fires on ANY bordered
  # element — without damping, a bordered third-party widget would feed its border
  # color into the page's border palette.
  brand_components:
    [header_bg, header_text, hero_bg, hero_text, cta_bg, cta_text, link,
     card_bg, card_text, page_bg, page_text, border]

  # --- CTA-label contrast relabel thresholds. ---------------------------------
  # Drives the in-code relabel documented in the interactivity block above. A non-anchor
  # clickable whose composited `effective_bg` is a non-canvas fill (CIEDE2000 ΔE >
  # canvas_delta_e from the derived page canvas), whose text is legible there
  # (contrast >= wcag_min_contrast) but illegible on the canvas (contrast < wcag_min_contrast),
  # is a CTA *label*: its `link` vote is relabeled to `cta_text`. 4.5 is the WCAG AA
  # normal-text floor. canvas_delta_e is a color-IDENTITY threshold, so it is CIEDE2000 (not
  # OKLab — OKLab ΔE is inaccurate near white/black, where canvases live): 1.0 ΔE2000 is the
  # just-noticeable-difference floor, matching the eval's measured `IDENTITY_TOLERANCE`.
  contrast_relabel:
    wcag_min_contrast: 4.5
    canvas_delta_e: 1.0
